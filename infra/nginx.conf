map $http_x_forwarded_proto $upstream_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $host $effective_forwarded_proto {
    default $upstream_forwarded_proto;
    foodgram-886.duckdns.org https;
}

server {
    listen 80;
    server_tokens off;
    client_max_body_size 20M;

    location = /api/docs {
        return 301 /api/docs/;
    }

    location /api/docs/ {
        alias /usr/share/nginx/html/api/docs/;
        index redoc.html;
        try_files $uri $uri/ /api/docs/redoc.html;
    }

    location /static/ {
        proxy_pass http://foodgram-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /backend-static/ {
        alias /static/;
    }

    location /media/ {
        alias /media/;
    }

    location / {
        proxy_pass http://foodgram-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://foodgram-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
    }

    location /admin/ {
        proxy_pass http://foodgram-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
    }
}
